name: Build Android APK & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Compute version info
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION_NAME="${TAG#v}"
          # Supports tags like v1.2.3 (patch) or v1.2 (treated as v1.2.0).
          # Falls back to the run number for manual/untagged workflow runs.
          if [[ "$VERSION_NAME" =~ ^([0-9]+)\.([0-9]+)\.?([0-9]*)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]:-0}"
            VERSION_CODE=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))
          else
            VERSION_CODE="${{ github.run_number }}"
            VERSION_NAME="dev-${{ github.run_number }}"
          fi
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            KEYSTORE_PATH="android/app/release.jks"
            echo "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "path=${KEYSTORE_PATH}" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK
        working-directory: android
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          KEYSTORE_FILE: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ "${{ steps.keystore.outputs.available }}" = "true" ]; then
            ./gradlew assembleRelease
          else
            echo "::warning::No keystore configured. Building debug APK. Set KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, and KEY_PASSWORD secrets for signed release builds that support over-the-air updates."
            ./gradlew assembleDebug
          fi

      - name: Rename APK with version
        run: |
          VERSION="${{ steps.version.outputs.version_name }}"
          if [ "${{ steps.keystore.outputs.available }}" = "true" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk "post-apocalyptic-game-${VERSION}.apk"
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk "post-apocalyptic-game-${VERSION}.apk"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: post-apocalyptic-game-apk
          path: post-apocalyptic-game-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: post-apocalyptic-game-*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
